server:
  port: 8080

spring:
  application:
    name: api-gateway-service
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
              - http://localhost:3000
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/auth/**
        - id: user-profile-service
          uri: ${USER_PROFILE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/profile/**
        - id: dsa-service
          uri: ${DSA_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/dsa/**
        - id: mock-service
          uri: ${MOCK_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/mock/**
        - id: project-experience-service
          uri: ${PROJECT_EXPERIENCE_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/project/**,/experience/**
        - id: resume-ats-service
          uri: ${RESUME_ATS_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/resume/**
        - id: readiness-service
          uri: ${READINESS_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/readiness/**
        - id: ai-gateway-service
          uri: ${AI_GATEWAY_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/ai-gateway/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
